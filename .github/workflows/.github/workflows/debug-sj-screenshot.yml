name: Debug SJ screenshot

on:
  workflow_dispatch:
    inputs:
      travel_date:
        description: "Travel date (YYYY-MM-DD)"
        required: true
        default: "2026-07-15"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: node debug-sj-screenshot.js ${{ github.event.inputs.travel_date }}

      - name: Upload debug files
        uses: actions/upload-artifact@v4
        with:
          name: sj-desktop-debug
          path: |
            desktop-sj-debug.png
            desktop-sj-debug.txt
