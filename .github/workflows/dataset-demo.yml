name: Dataset Demo

on:
  workflow_dispatch:

jobs:
  dataset-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run dataset demo
        run: npm run dataset-demo

      - name: Upload dataset result
        uses: actions/upload-artifact@v4
        with:
          name: dataset-demo-result
          path: data/dataset-demo-result.json
