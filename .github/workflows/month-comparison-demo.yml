name: Month Comparison Demo

on:
  workflow_dispatch:

jobs:
  month-comparison-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run month comparison demo
        run: npm run month-comparison-demo

      - name: Upload month comparison artifacts
        uses: actions/upload-artifact@v4
        with:
          name: month-comparison-artifacts
          path: |
            data/month-comparison-result.txt
            artifacts/debug-missing-price.json
          if-no-files-found: warn
